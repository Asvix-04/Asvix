<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MediBot AI landing page preview">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="purpleBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="dashBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- Top navbar -->
  <rect x="0" y="0" width="1600" height="90" fill="#F8FAFC"/>
  <rect x="0" y="89" width="1600" height="1" fill="#E2E8F0"/>
  <circle cx="35" cy="45" r="12" fill="#84CC16"/>
  <circle cx="35" cy="45" r="8" fill="#166534" opacity="0.35"/>
  <text x="70" y="56" fill="#0E7490" font-size="46" font-family="Arial, sans-serif" font-weight="700">MediBot</text>
  <rect x="1410" y="18" width="170" height="54" rx="10" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1495" y="53" text-anchor="middle" fill="#475569" font-size="33" font-family="Arial, sans-serif" font-weight="600">Sign In</text>

  <!-- Hero section -->
  <rect x="0" y="90" width="1600" height="530" fill="url(#heroBg)"/>
  <path d="M 0 125 Q 1250 170 1600 580 L 1600 900 L 0 900 Z" fill="#D9F2F6" opacity="0.75"/>

  <text x="800" y="300" text-anchor="middle" fill="#334155" font-size="84" font-family="Arial, sans-serif" font-weight="700">Transform Your Health</text>
  <text x="800" y="388" text-anchor="middle" fill="#334155" font-size="84" font-family="Arial, sans-serif" font-weight="700">
    with <tspan fill="#6366F1">MediBot</tspan>
  </text>

  <text x="800" y="470" text-anchor="middle" fill="#64748B" font-size="40" font-family="Arial, sans-serif">Your AI-powered health companion that simplifies medication</text>
  <text x="800" y="518" text-anchor="middle" fill="#64748B" font-size="40" font-family="Arial, sans-serif">management, provides personalized insights, and ensures you never</text>
  <text x="800" y="566" text-anchor="middle" fill="#64748B" font-size="40" font-family="Arial, sans-serif">miss a dose.</text>

  <rect x="585" y="604" width="430" height="68" rx="14" fill="url(#purpleBtn)"/>
  <text x="800" y="647" text-anchor="middle" fill="#FFFFFF" font-size="38" font-family="Arial, sans-serif" font-weight="700">Get Started Free</text>

  <!-- Dashboard mock at bottom -->
  <rect x="230" y="740" width="1140" height="260" rx="28" fill="url(#dashBg)"/>
  <rect x="230" y="740" width="210" height="260" rx="28" fill="#0F172A"/>
  <rect x="438" y="740" width="2" height="260" fill="#1E293B"/>
  <text x="270" y="780" fill="#E2E8F0" font-size="28" font-family="Arial, sans-serif" font-weight="700">Medibot</text>

  <rect x="252" y="815" width="160" height="64" rx="12" fill="#334155"/>
  <circle cx="284" cy="847" r="20" fill="#94A3B8"/>
  <rect x="314" y="835" width="86" height="10" rx="5" fill="#CBD5E1"/>
  <rect x="314" y="852" width="70" height="8" rx="4" fill="#94A3B8"/>

  <text x="830" y="820" text-anchor="middle" fill="#A78BFA" font-size="52" font-family="Arial, sans-serif" font-weight="700">Manage Your Medications</text>
  <text x="830" y="852" text-anchor="middle" fill="#94A3B8" font-size="24" font-family="Arial, sans-serif">Track your medications and set reminders</text>
  <rect x="650" y="885" width="500" height="44" rx="22" fill="#334155"/>
  <circle cx="680" cy="907" r="8" fill="#94A3B8"/>
  <rect x="700" y="900" width="360" height="14" rx="7" fill="#64748B"/>
</svg>
